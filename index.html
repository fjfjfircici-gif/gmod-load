<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Whiteside RP - Chargement</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    body {
      background: url("loading.jpg") no-repeat center center;
      background-size: cover;
      position: relative;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
    }

    .top-left {
      position: absolute;
      top: 25px;
      left: 30px;
      z-index: 3;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.95);
    }

    .top-right {
      position: absolute;
      top: 20px;
      right: 25px;
      z-index: 3;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
    }

    .center-box {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 700px;
      max-width: 80%;
      padding: 35px 40px;
      transform: translate(-50%, -50%);
      z-index: 3;
      text-align: center;
      background: rgba(0,0,0,0.30);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.30);
    }

    .small-title {
      font-size: 16px;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 18px;
    }

    .main-title {
      font-size: 64px;
      font-weight: bold;
      margin-bottom: 20px;
      line-height: 1;
    }

    .subtitle {
      font-size: 20px;
      color: rgba(255,255,255,0.88);
      margin-bottom: 26px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .progress-fill {
      width: 50%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #5aa9ff, #cde6ff);
      animation: progressMove 3s ease-in-out infinite alternate;
    }

    .hint {
      margin-top: 12px;
      font-size: 15px;
      color: rgba(255,255,255,0.72);
    }

    .info-box {
      position: absolute;
      bottom: 25px;
      left: 30px;
      z-index: 3;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255,255,255,0.9);
      max-width: 340px;
    }

    @keyframes progressMove {
      0% { width: 30%; }
      100% { width: 85%; }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="top-left">WHITESIDE RP</div>
  <div class="top-right">Connexion en cours...</div>

  <div class="center-box">
    <div class="small-title">ROLEPLAY • COMMUNAUTÉ • IMMERSION</div>
    <div class="main-title">WHITESIDE RP</div>
    <div class="subtitle" id="subtitle">Connexion à Whiteside RP...</div>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <div class="hint">Merci de patienter pendant la connexion au serveur.</div>
  </div>

  <div class="info-box">
    <strong>Discord :</strong> discord.gg/4BGArFqTpc<br>
    <strong>Serveur :</strong> Whiteside RP
  </div>

  <script>
    const subtitles = [
      "Connexion à Whiteside RP...",
      "Chargement des ressources du serveur...",
      "Préparation de votre session roleplay...",
      "Synchronisation des données en cours..."
    ];

    let subtitleIndex = 0;

    setInterval(() => {
      subtitleIndex = (subtitleIndex + 1) % subtitles.length;
      document.getElementById("subtitle").textContent = subtitles[subtitleIndex];
    }, 3000);
  </script>
</body>
</html>
